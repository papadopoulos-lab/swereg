url: https://papadopoulos-lab.github.io/swereg/

template:
  package: pkgdowntemplate
  params:
    hero:
      overline: "R package · Swedish registry data"
      title: "Longitudinal skeletons from Swedish registries."
      lede: >
        Build incrementally-rebuildable person-week skeletons from Swedish
        healthcare registries, then run target trial emulations on top.
      cta:
        primary:
          text: "Get started"
          href: "articles/skeleton-concept.html"
        secondary:
          text: "Browse the reference →"
          href: "reference/index.html"

authors:
  footer:
    roles: [cre, aut]
    text: "Crafted by"
  sidebar:
    roles: [cre, aut, cph]
  before: "This package is proudly brought to you by:"
  after: "See the [changelog](news/index.html) for other contributors."
  Richard Aubrey White:
    href: "https://www.rwhite.no"

reference:
- title: Core functions
  desc: Main functions for creating and manipulating longitudinal skeletons
- contents:
  - create_skeleton
  - add_onetime
  - add_annual
  
- title: Medical data integration
  desc: Functions for adding medical registry data
- contents:
  - add_diagnoses
  - add_operations
  - add_cancer_without_morphology
  - add_rx
  - add_cods
  - add_quality_registry

- title: Data transformation
  desc: Functions for transforming data structure and creating derived variables
- contents:
  - make_rowind_first_occurrence
  
- title: Survival analysis
  desc: Helper functions for time-to-event and survival analysis
- contents:
  - steps_to_first
  - any_events_prior_to

- title: Target trial emulation
  desc: Functions and classes for causal inference using target trial emulation methodology
- contents:
  - TTEDesign
  - TTEPlan
  - TTEEnrollment
  - starts_with("tteplan_")
  - starts_with("tteenrollment_")
  - starts_with("skeleton_eligible")

- title: Parallel processing
  desc: Parallel batch processing via processx
- contents:
  - parallel_pool
  - setup_progress_handlers
  - default_n_workers

- title: Skeleton pipeline
  desc: RegistryStudy + Skeleton R6 classes and functions for batched skeleton processing
- contents:
  - RegistryStudy
  - Skeleton
  - registrystudy_load
  - create_skeleton
  - validate_skeleton_structure

- title: Multi-host path resolution
  desc: CandidatePath R6 class + helpers for resolving directories that live at different locations on different hosts
- contents:
  - CandidatePath
  - first_existing_path
  - invalidate_candidate_paths

- title: Utility functions
  desc: Helper functions for data processing
- contents:
  - fread_raw
  - qs2_read
  - qs2_write_atomic
  - make_lowercase_names
  - parse_swedish_date
  - first_non_na
  - last_non_na
  - min_with_infinite_as_na
  - max_with_infinite_as_na
  - as_logical_min_with_infinite_as_na
  - as_logical_max_with_infinite_as_na

- title: Specialized functions
  desc: Functions for specific research applications
- contents:
  - x2023_mht_add_lmed
  - x2026_mht_add_lmed

- title: Datasets
  desc: Synthetic registry data for development and examples
- contents:
  - fake_data

articles:
- title: Concept
  navbar: ~
  contents:
  - skeleton-concept
  - r6-class-overview
  - rowdep-rowind-concept

- title: Pipeline
  navbar: Pipeline
  contents:
  - skeleton-pipeline
  - tte-workflow

- title: TTE reference
  navbar: TTE reference
  contents:
  - tte-nomenclature
  - tte-methodology
  - tte-methods

- title: Manual workflow
  navbar: Manual workflow
  contents:
  - skeleton-create
  - skeleton-analyze

- title: add_* functions
  navbar: add_*
  contents:
  - builtin-add-functions
  - custom-add-functions

- title: Cookbooks
  navbar: Cookbooks
  contents:
  - cookbook-survival-analysis
